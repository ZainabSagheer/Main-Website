name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client (all binary targets)
        run: npx prisma generate

      - name: Build Next.js app
        run: node node_modules/next/dist/bin/next build
        env:
          DATABASE_URL: "mongodb+srv://placeholder:placeholder@placeholder.mongodb.net/bitsol"
          BLOG_API_KEY: ${{ secrets.BLOG_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SITE_URL: https://bitsolmarketing.com
          NEXT_PUBLIC_API_URL: https://admin.bitsolmarketing.com

      - name: Prepare standalone bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          cp -r prisma .next/standalone/prisma || true
          mkdir -p .next/standalone/node_modules/.prisma/client
          cp -r node_modules/.prisma/client/. .next/standalone/node_modules/.prisma/client/
          mkdir -p .next/standalone/node_modules/@prisma/client
          cp -r node_modules/@prisma/client/. .next/standalone/node_modules/@prisma/client/
          # Phusion Passenger entry point
          printf 'process.env.PORT = process.env.PORT || 3000;\nrequire("./server.js");\n' > .next/standalone/app.js

      # Pass secrets as env vars — never inline-substitute multiline secrets into shell scripts.
      - name: Write .env to standalone
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BLOG_API_KEY: ${{ secrets.BLOG_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          {
            echo "NODE_ENV=production"
            printf 'DATABASE_URL=%s\n' "$DATABASE_URL"
            printf 'BLOG_API_KEY=%s\n' "$BLOG_API_KEY"
            printf 'RESEND_API_KEY=%s\n' "$RESEND_API_KEY"
            echo "NEXT_PUBLIC_SITE_URL=https://bitsolmarketing.com"
            echo "NEXT_PUBLIC_API_URL=https://admin.bitsolmarketing.com"
          } > .next/standalone/.env

      - name: Create deployment tarball
        run: |
          cd .next/standalone
          tar -czf ../../deploy.tar.gz .

      - name: Upload Tarball as Artifact (Fallback)
        uses: actions/upload-artifact@v4
        with:
          name: hostinger-deploy-bundle
          path: deploy.tar.gz
          retention-days: 3

      - name: Upload tarball to Hostinger via SFTP
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          KEYFILE=$(mktemp)
          echo "$SSH_KEY" > "$KEYFILE"
          chmod 600 "$KEYFILE"
          sftp -P 65002 -i "$KEYFILE" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -b - u293105347@145.79.30.66 << 'SFTP_EOF'
          put deploy.tar.gz /home/u293105347/domains/bitsolmarketing.com/deploy.tar.gz
          SFTP_EOF
          rm -f "$KEYFILE"

      - name: Extract and restart on Hostinger via SSH
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          KEYFILE=$(mktemp)
          echo "$SSH_KEY" > "$KEYFILE"
          chmod 600 "$KEYFILE"
          ssh -p 65002 -i "$KEYFILE" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            u293105347@145.79.30.66 bash << 'ENDSSH'
          DEPLOY_DIR=/home/u293105347/domains/bitsolmarketing.com/public_nodejs
          TAR_FILE=/home/u293105347/domains/bitsolmarketing.com/deploy.tar.gz
          mkdir -p $DEPLOY_DIR
          rm -rf ${DEPLOY_DIR}_old
          mv $DEPLOY_DIR ${DEPLOY_DIR}_old 2>/dev/null || true
          mkdir -p $DEPLOY_DIR
          tar -xzf $TAR_FILE -C $DEPLOY_DIR && rm -f $TAR_FILE
          cd $DEPLOY_DIR && npm install --no-save prisma@6 @prisma/client@6 2>/dev/null || true && npx prisma generate 2>/dev/null || true
          mkdir -p $DEPLOY_DIR/tmp && touch $DEPLOY_DIR/tmp/restart.txt
          echo "Deployed at $(date)"
          ENDSSH
          rm -f "$KEYFILE"
