name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js app
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BLOG_API_KEY: ${{ secrets.BLOG_API_KEY }}
          NEXT_PUBLIC_APP_URL: https://bitsolmarketing.com

      - name: Prepare standalone output
        run: |
          mkdir -p .next/standalone/.next/static
          cp -r .next/static/. .next/standalone/.next/static/
          cp -r public .next/standalone/public
          cp -r prisma .next/standalone/prisma || true
          mkdir -p .next/standalone/node_modules/.prisma/client
          cp -r node_modules/.prisma/client/. .next/standalone/node_modules/.prisma/client/
          mkdir -p .next/standalone/node_modules/@prisma/client
          cp -r node_modules/@prisma/client/. .next/standalone/node_modules/@prisma/client/
          printf 'process.env.PORT = process.env.PORT || 3000;\nrequire("./server.js");\n' > .next/standalone/app.js

      - name: Sanitize Remote Target
        id: sanitize
        run: |
          TARGET="${{ secrets.REMOTE_TARGET }}"
          CLEAN_TARGET=$(echo "$TARGET" | sed 's/[\\/]*$//')
          echo "target=$CLEAN_TARGET" >> $GITHUB_OUTPUT

      - name: Write SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Deploy to Hostinger via rsync
        run: |
          rsync -av --delete --mkpath \
            -e "ssh -p 65002 -i /tmp/deploy_key \
                -o StrictHostKeyChecking=no \
                -o BatchMode=yes \
                -o ConnectTimeout=30 \
                -o ServerAliveInterval=30 \
                -o ServerAliveCountMax=5 \
                -o TCPKeepAlive=yes \
                -o LogLevel=ERROR" \
            .next/standalone/ \
            "${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:${{ steps.sanitize.outputs.target }}"

      - name: Restart Node.js app on Hostinger
        run: |
          ssh -p 65002 -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=5 \
            -o TCPKeepAlive=yes \
            -o LogLevel=ERROR \
            "${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}" \
            "pm2 restart all 2>/dev/null; mkdir -p '${{ steps.sanitize.outputs.target }}/tmp' && touch '${{ steps.sanitize.outputs.target }}/tmp/restart.txt'"
