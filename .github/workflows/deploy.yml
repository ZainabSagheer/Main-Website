name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js app
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BLOG_API_KEY: ${{ secrets.BLOG_API_KEY }}
          NEXT_PUBLIC_APP_URL: https://bitsolmarketing.com

      - name: Prepare standalone output
        run: |
          mkdir -p .next/standalone/.next/static
          cp -r .next/static/. .next/standalone/.next/static/
          cp -r public .next/standalone/public
          cp -r prisma .next/standalone/prisma || true
          mkdir -p .next/standalone/node_modules/.prisma/client
          cp -r node_modules/.prisma/client/. .next/standalone/node_modules/.prisma/client/
          mkdir -p .next/standalone/node_modules/@prisma/client
          cp -r node_modules/@prisma/client/. .next/standalone/node_modules/@prisma/client/
          printf 'process.env.PORT = process.env.PORT || 3000;\nrequire("./server.js");\n' > .next/standalone/app.js
          mkdir -p .next/standalone/tmp
          date -u > .next/standalone/tmp/restart.txt

      - name: Sanitize Remote Target
        id: sanitize
        run: |
          TARGET="${{ secrets.REMOTE_TARGET }}"
          CLEAN_TARGET=$(echo "$TARGET" | sed 's/[\\/]*$//')
          echo "target=$CLEAN_TARGET" >> $GITHUB_OUTPUT

      - name: Write SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Test SSH connectivity
        run: |
          ssh -p 65002 -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o LogLevel=VERBOSE \
            "${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}" \
            "echo SSH_OK && hostname" || echo "SSH test failed — check key / firewall"

      - name: Deploy to Hostinger via rsync
        run: |
          TARGET="${{ steps.sanitize.outputs.target }}"
          SSH_OPTS="-p 65002 -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            -o ConnectTimeout=60 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=8 \
            -o TCPKeepAlive=yes \
            -o Compression=no \
            -o IPQoS=throughput \
            -o LogLevel=ERROR"
          for attempt in 1 2 3 4 5; do
            echo "Deploy attempt $attempt/5..."
            rsync -av --delete --timeout=120 \
              --rsync-path="mkdir -p '$TARGET' && rsync" \
              -e "ssh $SSH_OPTS" \
              .next/standalone/ \
              "${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:$TARGET" && { echo "Deploy succeeded on attempt $attempt"; break; }
            echo "Attempt $attempt failed."
            [ $attempt -lt 5 ] && sleep 45
          done
          # Fail the workflow if all attempts failed
          rsync --dry-run -e "ssh $SSH_OPTS" \
            .next/standalone/app.js \
            "${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:$TARGET/" || \
            { echo "All deploy attempts failed — SSH connection to Hostinger is broken"; exit 1; }

