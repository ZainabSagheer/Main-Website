name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: node node_modules/next/dist/bin/next build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BLOG_API_KEY: ${{ secrets.BLOG_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SITE_URL: https://bitsolmarketing.com
          NEXT_PUBLIC_API_URL: https://admin.bitsolmarketing.com

      - name: Prepare standalone bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Write .env to standalone
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .next/standalone/.env
          echo "BLOG_API_KEY=${{ secrets.BLOG_API_KEY }}" >> .next/standalone/.env
          echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> .next/standalone/.env
          echo "NEXT_PUBLIC_SITE_URL=https://bitsolmarketing.com" >> .next/standalone/.env
          echo "NEXT_PUBLIC_API_URL=https://admin.bitsolmarketing.com" >> .next/standalone/.env

      - name: Create deployment tarball
        run: |
          cd .next/standalone
          tar -czf ../../deploy.tar.gz .

      - name: Ensure target directory exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 92.113.19.228
          username: u293105347
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          use_insecure_cipher: true
          script: |
            mkdir -p /home/u293105347/domains/bitsolmarketing.com/public_nodejs

      - name: Upload tarball to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 92.113.19.228
          username: u293105347
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          use_insecure_cipher: true
          source: "deploy.tar.gz"
          target: /home/u293105347/domains/bitsolmarketing.com/

      - name: Extract and finalize on Hostinger
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 92.113.19.228
          username: u293105347
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          use_insecure_cipher: true
          script: |
            set -e
            DEPLOY_DIR=/home/u293105347/domains/bitsolmarketing.com/public_nodejs
            TAR_FILE=/home/u293105347/domains/bitsolmarketing.com/deploy.tar.gz

            # Swap in new files
            rm -rf ${DEPLOY_DIR}_old
            mv $DEPLOY_DIR ${DEPLOY_DIR}_old 2>/dev/null || true
            mkdir -p $DEPLOY_DIR
            tar -xzf $TAR_FILE -C $DEPLOY_DIR
            rm -f $TAR_FILE

            # Restart the Node.js process
            pkill -f "node.*server.js" 2>/dev/null || true
            sleep 2
            cd $DEPLOY_DIR
            nohup node server.js > /tmp/nextjs.log 2>&1 &
            sleep 3
            if pgrep -f "node.*server.js" > /dev/null; then
              echo "App restarted successfully at $(date)"
            else
              echo "WARNING: App may not have started. Check /tmp/nextjs.log"
              cat /tmp/nextjs.log || true
            fi
