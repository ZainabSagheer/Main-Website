name: Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js app
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BLOG_API_KEY: ${{ secrets.BLOG_API_KEY }}
          NEXT_PUBLIC_APP_URL: https://bitsolmarketing.com

      - name: Prepare standalone output
        run: |
          mkdir -p .next/standalone/.next/static
          cp -r .next/static/. .next/standalone/.next/static/
          cp -r public .next/standalone/public
          cp -r prisma .next/standalone/prisma || true
          mkdir -p .next/standalone/node_modules/.prisma/client
          cp -r node_modules/.prisma/client/. .next/standalone/node_modules/.prisma/client/
          mkdir -p .next/standalone/node_modules/@prisma/client
          cp -r node_modules/@prisma/client/. .next/standalone/node_modules/@prisma/client/
          printf 'process.env.PORT = process.env.PORT || 3000;\nrequire("./server.js");\n' > .next/standalone/app.js
