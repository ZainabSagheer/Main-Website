name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js app
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BLOG_API_KEY: ${{ secrets.BLOG_API_KEY }}
          NEXT_PUBLIC_APP_URL: https://bitsolmarketing.com

      - name: Prepare standalone output
        run: |
          mkdir -p .next/standalone/.next/static
          cp -r .next/static/. .next/standalone/.next/static/
          cp -r public .next/standalone/public
          cp -r prisma .next/standalone/prisma || true
          mkdir -p .next/standalone/node_modules/.prisma/client
          cp -r node_modules/.prisma/client/. .next/standalone/node_modules/.prisma/client/
          mkdir -p .next/standalone/node_modules/@prisma/client
          cp -r node_modules/@prisma/client/. .next/standalone/node_modules/@prisma/client/
          printf 'process.env.PORT = process.env.PORT || 3000;\nrequire("./server.js");\n' > .next/standalone/app.js

      - name: Deploy to Hostinger via SSH
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-av --delete"
          SOURCE: ".next/standalone/"
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: 65002
          TARGET: ${{ secrets.REMOTE_TARGET }}
          SSH_CMD_ARGS: "-o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes"

      - name: Restart Node.js app on Hostinger
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          script: |
            cd ${{ secrets.REMOTE_TARGET }}
            # Try PM2 (VPS setup)
            pm2 restart all 2>/dev/null || true
            # Passenger restart (shared/business hosting)
            mkdir -p tmp && touch tmp/restart.txt
